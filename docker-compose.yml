services:

  # ── Backend API ──────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    container_name: api
    # NOT exposed to the host — only reachable via the internal network by nginx
    expose:
      - "8000"
    volumes:
      - ./data:/data
      - ./src:/app/src               # uploaded input files land here at runtime
    env_file:
      - .env
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── DB Backup sidecar ────────────────────────────────────────────────────────
  db-backup:
    build:
      context: ./backup
      dockerfile: Dockerfile
    restart: unless-stopped
    container_name: db-backup
    volumes:
      - ./data:/data:ro
      - ./backups:/backups          # bind-mount on host — daily .db snapshots land here
    networks:
      - app-net
    depends_on:
      api:
        condition: service_healthy

  # ── Frontend (nginx) ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BASE_PATH: ${BASE_PATH:-/}
    restart: unless-stopped
    container_name: frontend
    ports:
      - "8086:80"                      # public HTTP — put a TLS terminator in front for prod
    networks:
      - app-net
    depends_on:
      api:
        condition: service_healthy

# ── Internal network (backend is not reachable from outside) ──────────────────
networks:
  app-net:
    driver: bridge
    name: app-net
    external: true

