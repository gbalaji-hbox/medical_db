services:

  # ── Backend API ──────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    # NOT exposed to the host — only reachable via the internal network by nginx
    expose:
      - "8000"
    volumes:
      - api_data:/data               # SQLite DB + encryption key (persisted)
      - ./src:/app/src               # uploaded input files land here at runtime
    env_file:
      - .env                         # JWT_SECRET_KEY and any overrides go here
    environment:
      MEDICAL_DB_ROOT: /app
      DB_PATH: /data/api.db
      ENCRYPTION_KEY_FILE: /data/encryption.key
      # Tighten CORS to only accept requests from the nginx frontend
      CORS_ORIGINS: "http://localhost,http://frontend"
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── DB Backup sidecar ────────────────────────────────────────────────────────
  db-backup:
    build:
      context: ./backup
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - api_data:/data:ro           # read-only access to the SQLite volume
      - ./backups:/backups          # bind-mount on host — daily .db snapshots land here
    networks:
      - app-net
    depends_on:
      api:
        condition: service_healthy

  # ── Frontend (nginx) ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8086:80"                      # public HTTP — put a TLS terminator in front for prod
    networks:
      - app-net
    depends_on:
      api:
        condition: service_healthy

# ── Internal network (backend is not reachable from outside) ──────────────────
networks:
  app-net:
    driver: bridge
    name: app-net
    external: true

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  api_data:
