[pytest]
testpaths = tests/unit
asyncio_mode = auto
addopts = --cov=src/api --cov-report=term-missing --cov-report=html:htmlcov -q

[coverage:run]
source = src/api
omit =
    src/api/__init__.py
    src/api/routers/__init__.py

[coverage:report]
show_missing = true
exclude_lines =
    pragma: no cover
    raise NotImplementedError
    if __name__ == .__main__.:
